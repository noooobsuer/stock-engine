name: 研析三引擎综合分析
on:
  schedule:
    - cron: '0 12 * * 1-5'
    - cron: '0 14 * * 0'
  workflow_dispatch:
    inputs:
      stocks:
        description: '自定义股票(逗号分隔)'
        required: false
        default: ''

env:
  PYTHONIOENCODING: utf-8

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install yfinance pandas numpy

      - name: 🔍 三引擎组合分析
        id: engines
        env:
          CUSTOM_STOCKS: ${{ github.event.inputs.stocks }}
        run: |
          if [ -n "$CUSTOM_STOCKS" ]; then
            python github_workflow_runner.py --stocks "$CUSTOM_STOCKS" > report.txt
          else
            python github_workflow_runner.py > report.txt
          fi
          cat report.txt

      - name: 📤 Telegram推送
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then exit 0; fi
          MSG=$(head -c 4000 report.txt | python3 -c "import sys;print(sys.stdin.read().replace(chr(10),'%0A'))")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}&text=${MSG}" -o /dev/null && echo "Telegram OK" || true

      - name: 保存报告
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: report.txt
          retention-days: 30
