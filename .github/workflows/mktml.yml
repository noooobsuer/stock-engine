name: mktml 每日信号

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install scikit-learn xgboost pandas numpy yfinance duckdb plotly matplotlib requests beautifulsoup4 lxml

      - name: Setup
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          git clone --depth 1 https://github.com/smkwray/mktml.git /tmp/mktml
          echo "FRED key ok: ${FRED_API_KEY:0:8}..."

      - name: Init
        run: cd /tmp/mktml && python src/main.py --init-db 2>&1 | tail -3 || true

      - name: Scan
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: cd /tmp/mktml && python src/main.py --scan 2>&1 | tail -20

      - name: Notify
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then echo "skip"; exit 0; fi
          MSG="mktml scan done.%0AFirst-time local training: cd /f/mktml && .venv/Scripts/python src/main.py --pipeline full"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" -d "chat_id=${CHAT_ID}&text=${MSG}" || true
